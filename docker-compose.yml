services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env.pg
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U benkyou -d benkyou']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    env_file: .env
    # Override .env's localhost host: inside the compose network the DB is
    # reached via the `postgres` service name, not the host's published port.
    environment:
      DATABASE_URL: postgres://benkyou:benkyou@postgres:5432/benkyou
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3000:3000'

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://benkyou:benkyou@postgres:5432/benkyou
    depends_on:
      postgres:
        condition: service_healthy
